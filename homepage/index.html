<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simplarr Dashboard</title>
  <style>
    body {
      background-color: #1e1e2f;
      color: #ffffff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 400px;
    }
    .link {
      background-color: #2d2d44;
      color: #ffffff;
      font-size: 18px;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      border: none;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
      transition: background-color 0.2s;
    }
    .link:hover {
      background-color: #3e3e5f;
    }
    .link.secondary {
      background-color: #1e1e2f;
      border: 1px solid #3e3e5f;
      font-size: 14px;
      padding: 12px;
    }
    .link.secondary:hover {
      background-color: #2d2d44;
    }
    h1 {
      text-align: center;
      margin-bottom: 40px;
    }
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-top: -30px;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 Simplarr</h1>
    <p class="subtitle">Your home entertainment hub</p>

    <a class="link" id="plex" target="_blank">🎥 Plex</a>
    <a class="link" id="overseerr" target="_blank">📥 Request Content</a>
    <a class="link" id="radarr" target="_blank">🎬 Radarr (Movies)</a>
    <a class="link" id="sonarr" target="_blank">📺 Sonarr (TV Shows)</a>
    <a class="link" id="prowlarr" target="_blank">🔍 Prowlarr (Indexers)</a>
    <a class="link" id="qbittorrent" target="_blank">⬇️ qBittorrent</a>
    <a class="link" id="tautulli" target="_blank">📊 Tautulli (Stats)</a>
    <a class="link secondary" href="/status">📡 Service Status</a>
  </div>

  <script>
    // Each entry: service id (matches DOM id) → subdomain + port + path.
    // Prefer subdomain routing (plex.local, radarr.local, ...) so split-topology
    // services on different hosts route through the local nginx reverse proxy.
    // Port-based URLs kick in as a fallback only when the page is loaded by
    // raw IP or a single-label hostname (no TLD to derive).
    //
    // Plex is special: the web UI forces HTTPS on port 32400, which requires
    // a valid cert. Rather than ship an SSL story for the subdomain, default
    // the Plex tile to app.plex.tv (Plex's cloud web app that auto-discovers
    // your signed-in server). To route locally instead, replace href with
    // the subdomain/port form like the other services.
    const services = [
      { id: 'plex',        href: 'https://app.plex.tv/desktop'                      },
      { id: 'overseerr',   subdomain: 'overseerr',   port: 5055,  path: '/'    },
      { id: 'radarr',      subdomain: 'radarr',      port: 7878,  path: '/'    },
      { id: 'sonarr',      subdomain: 'sonarr',      port: 8989,  path: '/'    },
      { id: 'prowlarr',    subdomain: 'prowlarr',    port: 9696,  path: '/'    },
      { id: 'qbittorrent', subdomain: 'torrent',     port: 8080,  path: '/'    },
      { id: 'tautulli',    subdomain: 'tautulli',    port: 8181,  path: '/'    }
    ];

    const protocol = window.location.protocol;
    const hostname = window.location.hostname;
    const isIp = /^[0-9.]+$/.test(hostname) || /:/.test(hostname);
    const parts = hostname.split('.');
    const tld = (!isIp && parts.length >= 2) ? parts.slice(1).join('.') : null;

    for (const svc of services) {
      const el = document.getElementById(svc.id);
      if (!el) continue;
      if (svc.href) {
        el.href = svc.href;
      } else {
        el.href = tld
          ? `${protocol}//${svc.subdomain}.${tld}${svc.path}`
          : `${protocol}//${hostname}:${svc.port}${svc.path}`;
      }
    }
  </script>
</body>
</html>
