# =============================================================================
# Simplarr - Pi/Server Services (Split Setup)
# =============================================================================
# This compose file is for the Pi/Server in a split NAS+Pi deployment.
#
# PREREQUISITES:
#   1. NAS media folders mounted via NFS to /mnt/nas/
#      Example /etc/fstab entry:
#        192.168.1.100:/volume1/media /mnt/nas nfs defaults 0 0
#
#   2. Mount should contain: downloads/, movies/, tv/
#
#   3. Run ./setup.sh on the Pi to generate .env and substitute NAS IP
#      and subdomain TLD into nginx/split.conf.
#
# PLEX_DIRECT_HASH notes:
#   Tautulli and Overseerr both need to reach Plex over HTTPS, but Plex's
#   certificate is issued for `<dashed-ip>.<hash>.plex.direct`, not for
#   the raw IP. We provide an `extra_hosts` entry so these containers
#   resolve that hostname to the NAS IP — otherwise the TLS handshake fails
#   with "Hostname/IP does not match certificate's altnames".
#
#   Find your hash with:
#     grep -oP 'CertificateUUID="\K[a-f0-9]+' \
#       "$DOCKER_CONFIG"/plex/Library/Application\ Support/Plex\ Media\ Server/Preferences.xml
#   Or it's shown in Plex Settings → Network → Custom server access URLs.
#
# If your NFS mount is at a different path, update the volume mappings below.
# =============================================================================

services:
  radarr:
    image: linuxserver/radarr:6.0.4.10291-ls294
    container_name: radarr
    ports:
      - 7878:7878
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG}/radarr:/config
      - /mnt/nas/downloads:/downloads
      - /mnt/nas/movies:/movies
    healthcheck:
      test: curl -f http://localhost:7878/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr:4.0.16.2944-ls303
    container_name: sonarr
    ports:
      - 8989:8989
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG}/sonarr:/config
      - /mnt/nas/downloads:/downloads
      - /mnt/nas/tv:/tv
    healthcheck:
      test: curl -f http://localhost:8989/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  prowlarr:
    image: linuxserver/prowlarr:2.3.0.5236-ls138
    container_name: prowlarr
    ports:
      - 9696:9696
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_CONFIG}/prowlarr:/config
    healthcheck:
      test: curl -f http://localhost:9696/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  tautulli:
    image: linuxserver/tautulli:v2.16.1-ls217
    container_name: tautulli
    ports:
      - 8181:8181
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    # Resolve Plex's plex.direct cert hostname to the NAS IP so Tautulli's
    # TLS connection to Plex validates. See PLEX_DIRECT_HASH note above.
    extra_hosts:
      - "${NAS_IP_DASHED:-0-0-0-0}.${PLEX_DIRECT_HASH:-unset}.plex.direct:${NAS_IP:-0.0.0.0}"
    volumes:
      - ${DOCKER_CONFIG}/tautulli:/config
      - /mnt/nas/movies:/movies
      - /mnt/nas/tv:/tv
    healthcheck:
      test: curl -f http://localhost:8181/status || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Reverse Proxy
  # NOTE: Edit nginx/split.conf and replace YOUR_NAS_IP with your NAS IP address
  nginx:
    image: nginx:1.28.2-alpine3.23
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DOCKER_CONFIG}/nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/split.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DOCKER_CONFIG}/nginx/logs:/var/log/nginx
    healthcheck:
      test: curl -f http://localhost:80 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  overseerr:
    image: sctx/overseerr:1.35.0
    container_name: overseerr
    ports:
      - 5055:5055
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
    # Same reasoning as tautulli: lets Overseerr's Plex library scan
    # reach Plex over HTTPS with a matching cert hostname.
    extra_hosts:
      - "${NAS_IP_DASHED:-0-0-0-0}.${PLEX_DIRECT_HASH:-unset}.plex.direct:${NAS_IP:-0.0.0.0}"
    volumes:
      - ${DOCKER_CONFIG}/overseerr:/app/config
    healthcheck:
      test: wget -q --spider http://localhost:5055/api/v1/status || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  homepage:
    build: ./homepage
    container_name: homepage
    expose:
      - "80"
    environment:
      - PLEX_PORT=${PLEX_PORT:-32400}
      - OVERSEERR_PORT=${OVERSEERR_PORT:-5055}
      - RADARR_PORT=${RADARR_PORT:-7878}
      - SONARR_PORT=${SONARR_PORT:-8989}
      - PROWLARR_PORT=${PROWLARR_PORT:-9696}
      - QBITTORRENT_PORT=${QBITTORRENT_PORT:-8080}
      - TAUTULLI_PORT=${TAUTULLI_PORT:-8181}
    healthcheck:
      test: curl -f http://localhost:80 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  default:
    name: media-network

