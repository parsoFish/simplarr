# =============================================================================
# Simplarr Nginx Configuration - Split Setup (NAS + Pi)
# =============================================================================
# Services SPLIT across machines:
#   - NAS: Plex, qBittorrent (storage/transcoding)
#   - Pi/Server: Radarr, Sonarr, Prowlarr, Overseerr, Tautulli, Nginx
#
# SETUP placeholders (setup.sh substitutes these automatically):
#   - YOUR_NAS_IP        → IP of the NAS running Plex and qBittorrent
#   - SUBDOMAIN_TLD      → TLD used for service subdomains (default: local)
#                          Only works on mDNS-capable networks; set DNS
#                          entries (e.g. dnsmasq) to point *.SUBDOMAIN_TLD at
#                          the Pi's IP.
#
# Access via:
#   - Path-based:   http://<pi-ip>/plex, /radarr, /sonarr, etc.
#   - Subdomain:    http://plex.SUBDOMAIN_TLD, radarr.SUBDOMAIN_TLD, ... (requires DNS setup)
# =============================================================================

# -----------------------------------------------------------------------------
# Main Entry Point - Homepage + Path-Based Access
# -----------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name _;

    # Homepage Dashboard
    location = / {
        proxy_pass http://homepage:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Status Page
    location = /status {
        proxy_pass http://homepage:80/status.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # -------------------------------------------------------------------------
    # Health check endpoints (used by homepage for service-status polling).
    # Each route returns HTTP 200 when the service is reachable. status.html
    # fetches these same-origin so the dashboard works regardless of which
    # host runs which container (split: Plex + qBit on NAS, everything else
    # on Pi).
    # -------------------------------------------------------------------------
    location = /health/plex {
        proxy_pass https://YOUR_NAS_IP:32400/identity;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/radarr {
        proxy_pass http://radarr:7878/ping;
    }
    location = /health/sonarr {
        proxy_pass http://sonarr:8989/ping;
    }
    location = /health/prowlarr {
        proxy_pass http://prowlarr:9696/ping;
    }
    location = /health/overseerr {
        proxy_pass http://overseerr:5055/api/v1/status;
    }
    location = /health/qbittorrent {
        proxy_pass http://YOUR_NAS_IP:8080/;
        proxy_set_header Referer "";
        proxy_set_header Origin "";
    }
    location = /health/tautulli {
        proxy_pass http://tautulli:8181/status;
    }

    # Plex - on NAS
    location /plex {
        return 302 https://YOUR_NAS_IP:32400/web;
    }

    # Radarr
    location /radarr {
        proxy_pass http://radarr:7878;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sonarr
    location /sonarr {
        proxy_pass http://sonarr:8989;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prowlarr
    location /prowlarr {
        proxy_pass http://prowlarr:9696;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Overseerr
    location /overseerr {
        proxy_pass http://overseerr:5055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # qBittorrent - on NAS
    location /torrent {
        proxy_pass http://YOUR_NAS_IP:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Referer "";
        proxy_set_header Origin "";
    }

    # Tautulli
    location /tautulli {
        proxy_pass http://tautulli:8181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# -----------------------------------------------------------------------------
# Subdomain Access (requires DNS pointing *.SUBDOMAIN_TLD to Pi/Server IP)
# -----------------------------------------------------------------------------
# NOTE: home.SUBDOMAIN_TLD / home.localhost are intentionally NOT a separate
# server block. Nginx routes unmatched server_names to the default server
# (server_name _;), which already serves homepage + /status + /health/* +
# path-based routes. A dedicated home.* block would only re-declare
# `location /` and end up shadowing those routes with 404s.

# Plex Media Server (on NAS)
server {
    listen 80;
    server_name plex.SUBDOMAIN_TLD plex.localhost;

    location / {
        proxy_pass https://YOUR_NAS_IP:32400/;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}

# qBittorrent (on NAS)
server {
    listen 80;
    server_name torrent.SUBDOMAIN_TLD qbittorrent.SUBDOMAIN_TLD;

    location / {
        proxy_pass http://YOUR_NAS_IP:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Referer "";
        proxy_set_header Origin "";
    }
}

